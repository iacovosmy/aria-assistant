<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Aria â Personal AI Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-authentication-library/2.38.3/msal-browser.min.js"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#F7F6F3; --surface:#FFF; --surface2:#F0EEE9;
    --border:rgba(0,0,0,0.07); --border-strong:rgba(0,0,0,0.13);
    --text:#1A1916; --muted:#6B6960; --hint:#A09E97;
    --accent:#1A6B3C; --accent-light:#E8F5EE; --accent-mid:#2D9B5A;
    --user-bg:#1A1916; --user-text:#F7F6F3;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:0 4px 16px rgba(0,0,0,0.08);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#141412;--surface:#1E1D1A;--surface2:#252420;
    --border:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);
    --text:#F0EDE6;--muted:#9A9890;--hint:#6B6960;
    --accent:#3DBB6E;--accent-light:#0D2B1A;--accent-mid:#2D9B5A;
    --user-bg:#F0EDE6;--user-text:#141412;
    --shadow:0 1px 3px rgba(0,0,0,0.3);--shadow-md:0 4px 16px rgba(0,0,0,0.4);
  }}
  html,body{height:100%;font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}


  /* SCREENS */
  .screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}
  .screen.active{display:flex;}
  #app{display:none;flex-direction:column;height:100vh;height:100dvh;max-width:800px;margin:0 auto;}
  #app.active{display:flex;}
